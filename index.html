<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devious Duo Productions</title>
    <meta name="description" content="Devious Duo Productions showcase for video projects, game prototypes, and studio highlights.">
    <meta property="og:title" content="Devious Duo Productions">
    <meta property="og:description" content="Devious Duo Productions showcase for video projects, game prototypes, and studio highlights.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="images/logo/devious-duo-productions.svg">
    <link rel="stylesheet" href="css/combined.min.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Devious Duo Productions",
        "url": "https://deviousduoproductions.com",
        "sameAs": []
    }
    </script>
</head>

<body>
    <header id="shared-header"></header>

    <div id="global-search-modal" class="search-modal">
        <div class="search-modal-content">
            <div class="search-header">
                <div class="search-container">
                    <input type="text" id="global-search-input" class="custom-input" placeholder="Search projects, skills, achievements, activities..." autofocus>
                    <button id="global-search-clear" class="input-clear-button close-button" aria-label="Clear search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <button class="search-close-btn">&times;</button>
            </div>
            <div class="search-type-filters" role="group" aria-label="Include in results">
                <span class="search-type-filters-label">INCLUDE:</span>
                <label class="search-type-filter-item">
                    <input type="checkbox" class="global-search-type-filter" value="all" checked>
                    <span class="search-type-filter-text">All</span>
                </label>
                <label class="search-type-filter-item">
                    <input type="checkbox" class="global-search-type-filter" value="achievement" checked>
                    <span class="search-type-filter-text">Achievements</span>
                </label>
                <label class="search-type-filter-item">
                    <input type="checkbox" class="global-search-type-filter" value="activity" checked>
                    <span class="search-type-filter-text">Activities</span>
                </label>
                <label class="search-type-filter-item">
                    <input type="checkbox" class="global-search-type-filter" value="skill" checked>
                    <span class="search-type-filter-text">Skills</span>
                </label>
<label class="search-type-filter-item">
                    <input type="checkbox" class="global-search-type-filter" value="video" checked>
                    <span class="search-type-filter-text">Videos</span>
                </label>
                <label class="search-type-filter-item">
                    <input type="checkbox" class="global-search-type-filter" value="game" checked>
                    <span class="search-type-filter-text">Games</span>
                </label>
            </div>
            <div id="search-results" class="search-results"></div>
        </div>
    </div>

    <main id="page-root"></main>

    <footer id="shared-footer" class="page-footer"></footer>

    <script src="js/bundle.min.js" defer></script>
</body>

</html>
